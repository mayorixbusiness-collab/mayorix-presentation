<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayorix Business Presentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        /* 1. SETUP & CORE DESIGN */
        :root {
            --bg-dark: #060709;
            --card-bg: rgba(31, 40, 51, 0.4);
            --border-glow: rgba(0, 210, 255, 0.15);
            --accent-cyan: #00d2ff;
            --accent-purple: #9d4edd;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --gradient-primary: linear-gradient(135deg, #00d2ff 0%, #9d4edd 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Assistant', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: pointer;
        }

        /* 2. SLIDE CONTAINER SYSTEM */
        .presentation-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0.8s;
            background-color: var(--bg-dark);
        }

        .slide-container.active {
            opacity: 1;
            visibility: visible;
        }

        /* Background effects */
        .slide-container::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.05) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
        }

        .slide-container::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.04) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            pointer-events: none;
        }

        /* 3. TYPOGRAPHY (ENLARGED) */
        h1, h2, h3 {
            font-family: 'Heebo', sans-serif;
            line-height: 1.1;
        }

        .gradient-text {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .slide-title {
            font-size: 80px;
            margin-bottom: 40px;
            text-align: center;
            width: 100%;
        }

        .slide-title span {
            border-bottom: 6px solid var(--accent-cyan);
            padding-bottom: 10px;
        }

        p, li {
            font-size: 28px;
            line-height: 1.5;
            color: var(--text-muted);
        }

        /* 4. LAYOUTS & COMPONENTS */
        .hero-title {
            font-size: 140px;
            margin-bottom: 20px;
        }
        .hero-subtitle {
            font-size: 45px;
            font-weight: 300;
            margin-bottom: 40px;
        }
        .hero-subtitle b {
            color: var(--accent-cyan);
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            width: 100%;
            max-width: 1200px;
        }

        .premium-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
            text-align: right;
        }

        .premium-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-purple);
        }

        .card-icon {
            font-size: 50px;
            color: var(--accent-cyan);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 36px;
            color: #fff;
            margin-bottom: 15px;
        }
